# cargo-deny — §4 supply chain + §2 layer boundaries check.
# §7.3: domain importing SDKs is rejected. We forbid reqwest/axum/tokio in the
# `msm-scoring-domain` crate by whitelist-only dependencies.

[graph]
all-features = false

[advisories]
# §4: dependency scanning in CI. Fail on any unmaintained / vulnerable.
yanked = "deny"

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "MPL-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"

# Domain-layer import guard. If `reqwest` or `axum` ever reach msm-scoring-domain,
# cargo-deny fails the build (§2 enforcement).
[[bans.deny]]
name = "reqwest"
wrappers = ["msm-scoring-infrastructure", "msm-scoring-presentation"]

[[bans.deny]]
name = "axum"
wrappers = ["msm-scoring-presentation"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
